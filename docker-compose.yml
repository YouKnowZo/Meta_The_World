version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-metatheworld}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"

  spatial-service:
    build:
      context: ./services/spatial
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-metatheworld}
      REDIS_URL: redis://redis:6379
      PORT: ${PORT:-3000}
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    depends_on:
      - db
      - redis

  bridge-service:
    build:
      context: ./services/bridge
      dockerfile: Dockerfile
    environment:
      REDIS_URL: redis:6379
      GRPC_PORT: 50051
      WS_PORT: 8080
    ports:
      - "50051:50051"
      - "8081:8080"
    depends_on:
      - redis

volumes:
  postgres_data:
